<!DOCTYPE html>
<html>
  <head>
    <script>
      // W13 (S5 note): this is Esri's official popup callback. The native EB custom-widget path
      // inherits the session via jimu-core SessionManager and drops OAuth entirely, so this file
      // is expected to disappear at migration. If OAuth is kept long-term, add an opener-origin
      // allow-list check before dispatching the auth payload.
      function loadHandler() {
        if (opener) {
          if (location.hash) {
            try {
              var esriId = opener.require("esri/kernel").id;
            } catch (e) {}
            if (esriId) {
              esriId.setOAuthResponseHash(location.hash);
            } else {
              opener.dispatchEvent(new CustomEvent("arcgis:auth:hash", { detail: location.hash }));
            }
          } else if (location.search) {
            opener.dispatchEvent(new CustomEvent("arcgis:auth:location:search", { detail: location.search }));
          }
        }
        close();
      }
    </script>
  </head>
  <body onload="loadHandler();"></body>
</html>
